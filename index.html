<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbw_laSyxz1P8jCCbDRe2HaSDLmV8lEUHSf7P4UYgTiEKJCA8Z-7GPUUghNilLh8lFWR/exec';
</script>

<style>
  :root {
    --bg:      #0a0e14;
    --surf:    #11161f;
    --surf2:   #161c27;
    --bd:      rgba(148,163,184,0.12);
    --bdS:     rgba(148,163,184,0.22);
    --tx:      #e2e8f0;
    --txD:     #94a3b8;
    --txF:     #64748b;
    --ac:      #2dd4bf;
    --acDim:   rgba(45,212,191,0.12);
    --win:     #34d399;
    --loss:    #f87171;
    --warn:    #fbbf24;
    --warnDim: rgba(251,191,36,0.10);
    --danger:  #ef4444;
    --danDim:  rgba(239,68,68,0.10);
    --mono: 'JetBrains Mono','SF Mono',ui-monospace,monospace;
    --sans: 'Inter',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh}
  input,select,textarea{font-family:var(--sans);background:var(--surf2);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:13px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--acDim)}
  button{cursor:pointer;font-family:var(--sans);border:none;transition:all .18s}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:var(--bdS);border-radius:99px}
  .tnum{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* Layout */
  #app{display:flex;flex-direction:column;min-height:100vh}
  #header{background:rgba(10,14,20,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  #nav{border-bottom:1px solid var(--bd);background:rgba(17,22,31,.8);overflow-x:auto}
  #nav-inner{display:flex;gap:4px;padding:10px 16px;max-width:1080px;margin:0 auto}
  #content{max-width:1080px;margin:0 auto;padding:24px 16px 100px;width:100%;flex:1}

  /* Cards */
  .card{background:var(--surf);border:1px solid var(--bd);border-radius:14px;padding:20px}
  .card.accent{border-color:rgba(45,212,191,.35)}
  .surface{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:13px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;font-weight:600;font-size:13.5px;padding:10px 18px}
  .btn-primary{background:var(--ac);color:#04111a}
  .btn-ghost{background:var(--surf2);color:var(--tx);border:1px solid var(--bd)}
  .btn-success{background:var(--win);color:#04130c}
  .btn-danger{background:var(--danDim);color:var(--loss);border:1px solid rgba(239,68,68,.35)}
  .btn-subtle{background:transparent;color:var(--txD)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-full{width:100%}
  .btn-sm{padding:7px 13px;font-size:12.5px}

  /* Nav tab */
  .nav-tab{display:flex;align-items:center;gap:6px;padding:8px 15px;border-radius:99px;font-size:13px;font-weight:600;white-space:nowrap;border:1px solid transparent;color:var(--txD);background:transparent;transition:all .18s}
  .nav-tab.active{color:var(--ac);background:var(--acDim);border-color:rgba(45,212,191,.35)}

  /* Phase tabs */
  .phase-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .phase-tab{padding:12px 4px;border-radius:11px;display:flex;flex-direction:column;align-items:center;gap:5px;border:1px solid var(--bd);background:var(--surf);font-size:11.5px;font-weight:600;color:var(--txD);transition:all .18s}
  .phase-tab.active{color:var(--ac);background:var(--acDim);border-color:rgba(45,212,191,.5)}
  .phase-tab.done{border-color:rgba(52,211,153,.35);color:var(--win)}

  /* Stats grid */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .stat-card{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
  .stat-label{font-size:10.5px;color:var(--txF);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .stat-value{font-size:20px;font-weight:600;font-family:var(--mono)}

  /* Scale field */
  .scale-btns{display:flex;gap:4px;margin-top:6px}
  .scale-btn{flex:1;aspect-ratio:1;border-radius:7px;border:1px solid var(--bd);background:var(--surf2);color:var(--txD);font-weight:600;font-size:12px;font-family:var(--mono);transition:all .15s}
  .scale-btn.active{background:var(--ac);border-color:var(--ac);color:#04111a}

  /* Yes/No */
  .yn-btns{display:flex;gap:8px;margin-top:6px}
  .yn-btn{flex:1;padding:9px;border-radius:9px;font-weight:600;font-size:13px;border:1px solid var(--bd);background:var(--surf2);color:var(--txD);transition:all .15s}
  .yn-btn.yes.active{border-color:var(--win);background:rgba(52,211,153,.15);color:var(--win)}
  .yn-btn.no.active{border-color:var(--loss);background:rgba(248,113,113,.1);color:var(--loss)}

  /* Grade buttons */
  .grade-btns{display:flex;gap:8px;margin-top:6px}
  .grade-btn{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:14px;font-family:var(--mono);border:1px solid var(--bd);background:var(--surf2);color:var(--txD);transition:all .15s}

  /* Task item */
  .task-item{width:100%;display:flex;align-items:flex-start;gap:10px;text-align:left;background:var(--surf2);border:1px solid var(--bd);border-radius:9px;padding:11px 13px;transition:all .18s}
  .task-item.checked{border-color:rgba(45,212,191,.35)}
  .task-check{width:18px;height:18px;border-radius:5px;flex-shrink:0;margin-top:1px;border:1.5px solid var(--bdS);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .task-check.checked{background:var(--ac);border-color:var(--ac)}

  /* Progress bar */
  .progress-bar{height:10px;background:var(--surf2);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;border-radius:99px;transition:width .4s ease}

  /* Banner */
  .banner{border-radius:14px;padding:18px}
  .banner-accent{background:var(--acDim);border:1px solid rgba(45,212,191,.35)}
  .banner-warn{background:var(--warnDim);border:1px solid rgba(251,191,36,.35)}
  .banner-danger{background:var(--danDim);border:1px solid rgba(239,68,68,.45)}
  .banner-win{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.35)}

  /* Trade row */
  .trade-row{border:1px solid var(--bd);background:var(--surf2);border-radius:10px;padding:12px}
  .trade-row.forced{border-color:rgba(239,68,68,.4);background:var(--danDim)}

  /* Utility */
  .label{font-size:13.5px;font-weight:500;display:block;margin-bottom:3px}
  .sub-label{font-size:11.5px;color:var(--txF);line-height:1.5;margin:0 0 8px}
  .gap-col{display:flex;flex-direction:column;gap:16px}
  .gap-row{display:flex;gap:12px;flex-wrap:wrap}
  .section-title{font-size:13px;font-weight:600;color:var(--txD);text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:100;font-size:14px;color:var(--txD)}
  .spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sync-indicator{font-size:11px;color:var(--ac);display:flex;align-items:center;gap:5px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @media(max-width:600px){
    #content{padding:16px 12px 90px}
    .phase-tabs{grid-template-columns:repeat(5,1fr)}
    .stats-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <span>Lade Daten aus Google Sheets…</span>
</div>

<div id="app" style="display:none">
  <div id="header">
    <div style="display:flex;align-items:center;gap:11px">
      <div style="width:34px;height:34px;border-radius:9px;background:var(--acDim);border:1px solid rgba(45,212,191,.35);display:flex;align-items:center;justify-content:center;font-size:16px">📈</div>
      <div>
        <h1 style="font-size:15px;font-weight:700;letter-spacing:-.02em">SBS Stoic Trader</h1>

      <span id="header-stage" style="font-size:10.5px;font-weight:700;color:var(--ac);padding:5px 10px;border-radius:8px;background:var(--acDim);border:1px solid rgba(45,212,191,.35)">DEMO</span>

        <div><label class="label" style="font-size:11.5px;color:var(--txF)">Daily Loss %</label><input type="number" step="0.5" id="set-daily" onchange="onSettingChange()"></div>

        <div><label class="label" style="font-size:11.5px;color:var(--txF)">Target %</label><input type="number" step="0.5" id="set-target" onchange="onSettingChange()"></div>
      </div>
      <p id="stage-note" style="font-size:11.5px;color:var(--txF);line-height:1.5"></p>

  <div id="nav"><div id="nav-inner"></div></div>
  <div id="content"></div>
</div>

<!-- Quick Action FAB -->
<button id="fab" onclick="fabToggle()" style="position:fixed;bottom:24px;right:24px;z-index:30;width:56px;height:56px;border-radius:50%;background:var(--ac);color:#04111a;font-size:26px;font-weight:700;box-shadow:0 8px 24px rgba(45,212,191,.3);transition:transform .3s;display:none">+</button>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const STAGE_DEFAULTS = {
  demo:       { key:'demo',       label:'Demo / Üben',       short:'DEMO', dailyLossPct:5,  maxLossPct:10, profitTargetPct:8,  note:'Demo mit echten Challenge-Limits.' },
  challenge1: { key:'challenge1', label:'Challenge Phase 1', short:'P1',   dailyLossPct:5,  maxLossPct:10, profitTargetPct:8,  note:'Phase 1 — Target erreichen ohne Limit zu reißen.' },
  challenge2: { key:'challenge2', label:'Challenge Phase 2', short:'P2',   dailyLossPct:5,  maxLossPct:10, profitTargetPct:5,  note:'Phase 2 — niedrigeres Target, gleiche Limits.' },
  funded:     { key:'funded',     label:'Funded',             short:'LIVE', dailyLossPct:5,  maxLossPct:10, profitTargetPct:0,  note:'Echtes Kapital. Einziger Job: Account behalten.' },
};
const INSTRUMENTS = {
  XAUUSD: { pipSize:0.1,    pipValuePerLot:10 },
  EURUSD: { pipSize:0.0001, pipValuePerLot:10 },
  GBPUSD: { pipSize:0.0001, pipValuePerLot:10 },
};
const GRADE_COLORS = { 'A+':'#34d399','A':'#34d399','B':'#fbbf24','C':'#fb923c','X':'#f87171' };
const NAV_ITEMS = [
  { id:'home',      label:'Heute',    icon:'📋' },
  { id:'analytics', label:'Analyse',  icon:'📊' },
  { id:'history',   label:'Verlauf',  icon:'📅' },
  { id:'playbook',  label:'Playbook', icon:'📓' },
  { id:'tools',     label:'Werkzeuge',icon:'🛡' },
  { id:'knowledge', label:'Wissen',   icon:'🧠' },
  { id:'roadmap',   label:'Weg',      icon:'🗺' },
];

// Vordefinierte Setup-Tags (erweiterbar)
const SETUP_TAGS = ['London Open','NY Open','Sweep','Continuation','Counter-Trend','Range','News','Reversal'];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = {
  dailyLogs: {},
  account: { size:100000, stage:'demo', rules:{ dailyLossPct:5, maxLossPct:10, profitTargetPct:8 } },
  activeSection: 'home',
  tasks: {},
  syncing: false,
};

// ═══════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════
function showSync(on) {
  const el = document.getElementById('sync-status');
  if (el) el.style.display = on ? 'flex' : 'none';
  state.syncing = on;
}

async function apiGet(action) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 10000); // 10s Timeout
  try {
    const r = await fetch(`${API_URL}?action=${action}`, { signal: ctrl.signal });
    clearTimeout(t);
    return r.json();
  } catch(e) {
    clearTimeout(t);
    throw e;
  }
}

async function apiPost(action, data) {
  showSync(true);
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action, data }),
    });
    return r.json();
  } finally {
    showSync(false);
  }
}

async function loadAll() {
  try {
    const d = await apiGet('getAll');
    if (d.logs)     state.dailyLogs = d.logs;
    if (d.settings) {
      state.account = { ...state.account, ...d.settings };
      if (d.settings.playbook) state.playbook = d.settings.playbook;
    }
  } catch(e) {
    console.warn('Google Sheets nicht erreichbar, arbeite lokal:', e);
  }
}

async function saveLog(date, log, immediate) {
  state.dailyLogs[date] = log;
  render();
  if (immediate) {
    if (logSaveTimer) { clearTimeout(logSaveTimer); logSaveTimer = null; }
    await apiPost('saveLog', { date, log });
  } else {
    if (logSaveTimer) clearTimeout(logSaveTimer);
    logSaveTimer = setTimeout(() => {
      apiPost('saveLog', { date, log });
      logSaveTimer = null;
    }, 1500);
  }
}
let logSaveTimer = null;

async function saveTrade(trade) {
  await apiPost('saveTrade', trade);
}

async function deleteTradeRemote(id) {
  await apiPost('deleteTrade', { id });
}

async function saveSettings(account) {
  state.account = account;
  updateHeaderStage();
  await apiPost('saveSettings', account);
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function today() { return new Date().toISOString().split('T')[0]; }
function todayLog() { return state.dailyLogs[today()] || { trades:[] }; }

function allTrades() {
  return Object.entries(state.dailyLogs).flatMap(([date, log]) =>
    (log.trades||[]).map(t => ({ ...t, date }))
  );
}

function calcCompletion(log) {
  const f = ['morningDone','preTradingDone','postTradingDone','eveningDone'];
  return Math.round(f.filter(k => log[k]).length / f.length * 100);
}

function calcDrawdown() {
  const { account, dailyLogs } = state;
  const size = account.size || 100000;
  const td = today();
  const todayPnl = (dailyLogs[td]?.trades||[]).reduce((s,t) => s+(parseFloat(t.pnl)||0), 0);
  const totalPnl = Object.values(dailyLogs).reduce((s, log) => s+(log.trades||[]).reduce((ss,t) => ss+(parseFloat(t.pnl)||0),0), 0);
  const dailyLimit = size * (account.rules.dailyLossPct/100);
  const maxLimit   = size * (account.rules.maxLossPct/100);
  const dailyUsed  = todayPnl < 0 ? Math.abs(todayPnl) : 0;
  const maxUsed    = totalPnl < 0 ? Math.abs(totalPnl) : 0;
  const dailyPct   = dailyLimit > 0 ? Math.min(100, dailyUsed/dailyLimit*100) : 0;
  const maxPct     = maxLimit   > 0 ? Math.min(100, maxUsed/maxLimit*100)   : 0;
  const dailyBlocked = dailyUsed >= dailyLimit;
  const maxBlocked   = maxUsed   >= maxLimit;
  const blocked      = dailyBlocked || maxBlocked;
  const tightPct     = Math.max(dailyPct, maxPct);
  const zone = blocked ? 'blocked' : tightPct >= 70 ? 'danger' : tightPct >= 40 ? 'warn' : 'safe';
  const targetEur = size * (account.rules.profitTargetPct/100);
  const targetPct = targetEur > 0 ? Math.min(100, Math.max(0, totalPnl/targetEur*100)) : 0;
  return { dailyLimit, maxLimit, dailyUsed, maxUsed, dailyPct, maxPct,
    dailyRemaining: Math.max(0, dailyLimit-dailyUsed),
    maxRemaining:   Math.max(0, maxLimit-maxUsed),
    dailyBlocked, maxBlocked, blocked, zone,
    targetEur, totalPnl, targetPct };
}

function fmt(n, digits=2) { return (n>=0?'+':'')+parseFloat(n).toFixed(digits); }
function fmtEur(n) { return (n>=0?'+':'')+Math.round(n)+'€'; }
function gradeColor(g) { return GRADE_COLORS[g]||'#94a3b8'; }

// ═══════════════════════════════════════════════════════════════
// RENDER CORE
// ═══════════════════════════════════════════════════════════════
function render() {
  renderNav();
  renderContent();
  updateHeaderStage();
}

function renderNav() {
  const el = document.getElementById('nav-inner');
  el.innerHTML = NAV_ITEMS.map(n => `
    <button class="nav-tab ${state.activeSection===n.id?'active':''}" onclick="setSection('${n.id}')">
      ${n.icon} ${n.label}
    </button>
  `).join('');
}

function setSection(id) {
  state.activeSection = id;
  render();
}

function updateHeaderStage() {
  const s = STAGE_DEFAULTS[state.account.stage] || STAGE_DEFAULTS.demo;
  const el = document.getElementById('header-stage');
  if(el) el.textContent = s.short;
  syncSettingsPanel();
}

function renderContent() {
  const el = document.getElementById('content');
  const s = state.activeSection;
  if (s==='home')      el.innerHTML = renderHome();
  if (s==='analytics') el.innerHTML = renderAnalytics();
  if (s==='history')   el.innerHTML = renderHistory();
  if (s==='playbook')  el.innerHTML = renderPlaybook();
  if (s==='tools')     el.innerHTML = renderTools();
  if (s==='knowledge') el.innerHTML = renderKnowledge();
  if (s==='roadmap')   el.innerHTML = renderRoadmap();
  attachEvents();
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════
function toggleSettings() {
  const p = document.getElementById('settings-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (p.style.display === 'block') syncSettingsPanel();
}

function syncSettingsPanel() {
  const a = state.account;
  const sz = document.getElementById('set-size');   if(sz) sz.value = a.size;
  const sd = document.getElementById('set-daily');  if(sd) sd.value = a.rules.dailyLossPct;
  const sm = document.getElementById('set-max');    if(sm) sm.value = a.rules.maxLossPct;
  const st = document.getElementById('set-target'); if(st) st.value = a.rules.profitTargetPct;
  const c  = document.getElementById('stage-btns-container');
  if(c) c.innerHTML = `
    <label class="label" style="font-size:11.5px;color:var(--txF)">Account-Stufe</label>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
      ${Object.values(STAGE_DEFAULTS).map(s => `
        <button class="btn btn-sm ${a.stage===s.key?'btn-primary':'btn-ghost'}" onclick="changeStage('${s.key}')">${s.label}</button>
      `).join('')}
    </div>`;
  const note = document.getElementById('stage-note');
  if(note) note.textContent = (STAGE_DEFAULTS[a.stage]||STAGE_DEFAULTS.demo).note;
}

function onSettingChange() {
  const a = state.account;
  a.size = parseFloat(document.getElementById('set-size').value)||100000;
  a.rules.dailyLossPct = parseFloat(document.getElementById('set-daily').value)||5;
  a.rules.maxLossPct   = parseFloat(document.getElementById('set-max').value)||10;
  a.rules.profitTargetPct = parseFloat(document.getElementById('set-target').value)||0;
  saveSettings(a);
}

function changeStage(key) {
  const s = STAGE_DEFAULTS[key];
  if(!s) return;
  state.account.stage = key;
  state.account.rules = { dailyLossPct: s.dailyLossPct, maxLossPct: s.maxLossPct, profitTargetPct: s.profitTargetPct };
  saveSettings(state.account);
  syncSettingsPanel();
  render();
}

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
function renderHome() {
  const log = todayLog();
  const dd  = calcDrawdown();
  const trades = log.trades||[];
  const hour = new Date().getHours();
  const phases = ['morning','preTrading','trades','postTrading','evening'];
  const phaseDone = { morning:log.morningDone, preTrading:log.preTradingDone, trades:trades.length>0, postTrading:log.postTradingDone, evening:log.eveningDone };
  const active = state.activePhase || (hour<9?'morning':hour<13?'preTrading':hour<17?'postTrading':'evening');

  return `
  <div class="gap-col">
    <div>
      <h2 style="font-size:22px;font-weight:700;letter-spacing:-.02em">Today's Log</h2>
      <p style="font-size:12.5px;color:var(--txF);margin-top:2px">${new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})}</p>
    </div>

    ${renderSmartBanner(log, dd)}
    ${renderDdCockpit(dd)}

    <!-- Phase Tabs -->
    <div class="phase-tabs">
      ${[
        {id:'morning',label:'Morning',icon:'🌅'},
        {id:'preTrading',label:'Pre',icon:'👁'},
        {id:'trades',label:'Trades',icon:'📊'},
        {id:'postTrading',label:'Post',icon:'📝'},
        {id:'evening',label:'Evening',icon:'🌙'},
      ].map(p => `
        <button class="phase-tab ${active===p.id?'active':''} ${phaseDone[p.id]?'done':''}" onclick="setPhase('${p.id}')">
          <span style="font-size:18px">${p.icon}</span>
          <span>${p.label}</span>
          ${phaseDone[p.id]?'<span style="font-size:11px;color:var(--win)">✓</span>':''}
        </button>
      `).join('')}
    </div>

    ${active==='morning'    ? renderMorning(log)     : ''}
    ${active==='preTrading' ? renderPreTrading(log)  : ''}
    ${active==='trades'     ? renderTradesPhase(log, dd) : ''}
    ${active==='postTrading'? renderPostTrading(log) : ''}
    ${active==='evening'    ? renderEvening(log)     : ''}
  </div>`;
}

function setPhase(p) {
  state.activePhase = p;
  render();
}

function renderSmartBanner(log, dd) {
  const phases = [
    {id:'morning',label:'Morning Registration',done:log.morningDone},
    {id:'preTrading',label:'Pre-Trading Check',done:log.preTradingDone},
    {id:'trades',label:'Trades dokumentieren',done:(log.trades||[]).length>0},
    {id:'postTrading',label:'Post-Trading Review',done:log.postTradingDone},
    {id:'evening',label:'Evening Reflection',done:log.eveningDone},
  ];
  const allDone = phases.every(p=>p.done);
  const next = phases.find(p=>!p.done)||phases[4];
  const triggers = Object.values(log.morning?.triggers||{}).filter(Boolean).length;
  return `
  <div class="card accent" style="position:relative">
    <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--ac);font-weight:700;margin-bottom:10px">${allDone?'Tag komplett':'Jetzt dran'}</div>
    ${allDone ? `
      <h3 style="font-size:18px;font-weight:700;color:var(--win)">Alle Phasen erledigt</h3>
      <p style="font-size:13.5px;color:var(--txD);margin-top:4px">Heute vollständig dokumentiert.</p>
    ` : `
      <div style="display:flex;align-items:center;gap:13px">
        <div style="flex:1">
          <h3 style="font-size:17px;font-weight:700">${next.label}</h3>
        </div>
        <button class="btn btn-primary btn-sm" onclick="setPhase('${next.id}')">Start</button>
      </div>
    `}
    ${dd.blocked?`<div class="banner banner-danger" style="margin-top:14px;display:flex;gap:8px;align-items:flex-start"><span>🔒</span><span style="font-size:12.5px"><strong>Trading gesperrt.</strong> ${dd.dailyBlocked?'Tageslimit':'Max-Drawdown'} erreicht. Post-Trading-Phase aufrufen.</span></div>`:''}
    ${!dd.blocked&&dd.zone==='danger'?`<div class="banner banner-warn" style="margin-top:14px;font-size:12.5px;color:var(--warn)"><strong>Gefahrenzone.</strong> Noch ${Math.round(dd.dailyRemaining)}€ Tagespuffer. Nur A+-Setups oder aufhören.</div>`:''}
    ${triggers>0&&!dd.blocked?`<div class="banner banner-danger" style="margin-top:14px;font-size:12.5px;color:var(--loss)"><strong>${triggers} Trigger aktiv.</strong> Trading heute nicht empfohlen.</div>`:''}
    <div style="display:flex;gap:5px;margin-top:16px">
      ${phases.map(p=>`<div style="flex:1;height:3px;border-radius:99px;background:${p.done?'var(--win)':'var(--bd)'}"></div>`).join('')}
    </div>
  </div>`;
}

function renderDdCockpit(dd) {
  const zc = dd.zone==='blocked'?'var(--danger)':dd.zone==='danger'?'var(--loss)':dd.zone==='warn'?'var(--warn)':'var(--win)';
  const bar = (pct, label, used, limit) => `
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:12px;color:var(--txD)">${label}</span>
        <span class="tnum" style="font-size:12px;color:var(--txF)">−${Math.round(used)}€ / ${Math.round(limit)}€</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>=70?'var(--loss)':pct>=40?'var(--warn)':'var(--win)'}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span class="tnum" style="font-size:10.5px;color:var(--txF)">${Math.round(pct)}% ausgeschöpft</span>
        <span class="tnum" style="font-size:10.5px;color:var(--txF)">noch ${Math.round(limit-used)}€</span>
      </div>
    </div>`;
  return `
  <div class="card" style="border-color:${zc}40">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">🛡 <h3 style="font-size:15px;font-weight:600">Limit-Wächter</h3></div>
      <span style="font-size:11.5px;font-weight:600;color:${zc};padding:4px 9px;border-radius:7px;background:${zc}18">${STAGE_DEFAULTS[state.account.stage]?.label||'DEMO'}</span>
    </div>
    <div class="gap-col">
      ${bar(dd.dailyPct,'Tagesverlust-Limit',dd.dailyUsed,dd.dailyLimit)}
      ${bar(dd.maxPct,'Gesamt-Drawdown-Limit',dd.maxUsed,dd.maxLimit)}
      ${dd.targetEur>0?`
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:12px;color:var(--txD)">Profit-Ziel</span>
          <span class="tnum" style="font-size:12px;color:var(--txF)">${Math.round(dd.totalPnl)}€ / ${Math.round(dd.targetEur)}€</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${dd.targetPct}%;background:var(--ac)"></div></div>
      </div>`:'' }
    </div>
    <div style="margin-top:14px;padding:11px;border-radius:9px;background:${zc}14;border:1px solid ${zc}30;font-size:12.5px;color:${zc};font-weight:600">
      ${{blocked:'🔒 Limit erreicht — Trading gesperrt',danger:'⚠ Gefahrenzone — defensiv bleiben',warn:'⚠ Achtung — Puffer schrumpft',safe:'✓ Im sicheren Bereich'}[dd.zone]}
    </div>
  </div>`;
}

// MORNING
function renderMorning(log) {
  const m = log.morning||{};
  const triggers = [
    {id:'streit',text:'Streit mit einer wichtigen Person in den letzten 12h'},
    {id:'schlaf',text:'Weniger als 6h geschlafen'},
    {id:'business',text:'Akutes Problem im Bauträger-Business'},
    {id:'loss',text:'Der Verlust vom Vortag beschäftigt mich noch'},
    {id:'zwang',text:'Gefühl, heute UNBEDINGT etwas machen zu müssen'},
  ];
  const anyTrigger = Object.values(m.triggers||{}).some(Boolean);
  return `
  <div class="card gap-col">
    <div><h3 style="font-size:17px;font-weight:700">🌅 Morning Registration <span style="font-size:11.5px;color:var(--txF)">5–7 Min</span></h3>
      <p style="font-size:13px;color:var(--txD);line-height:1.6;margin-top:6px">Self-monitoring ist der einzige zuverlässige Prediktor für Verhaltensänderung. Ohne diese Baseline kann dein Trading nicht im Kontext deiner Verfassung bewertet werden.</p>
    </div>
    ${scaleField('Schlafqualität',m.sleep,'morning-sleep','Schlafqualität wirkt direkt auf PFC-Funktion. ≤6h senken Performance um ~30%.','Furchtbar','Sehr gut')}
    ${scaleField('Stresslevel',m.stress,'morning-stress','Cortisol ist das stärkste Hormon, das Trading-Entscheidungen sabotiert.','Ruhig','Maximal')}
    ${scaleField('Energie',m.energy,'morning-energy','Energy ≠ Motivation. Trading braucht beides.','Erschöpft','Voll')}
    <div>
      <label class="label">Tagesintention <span class="sub-label" style="display:inline;margin:0"> — eine Sache</span></label>
      <input id="morning-intention" value="${m.intention||''}" placeholder="Heute fokussiere ich mich auf…">
    </div>
    <div class="surface" style="border-color:rgba(251,191,36,.2)">
      <div style="font-size:13.5px;font-weight:600;margin-bottom:8px;color:var(--warn)">⚠ Trigger-Screening</div>
      <p class="sub-label">Schon ein aktiver Trigger = erhöhtes Cortisol, eingeschränkter PFC.</p>
      <div class="gap-col" style="gap:8px">
        ${triggers.map(t=>`
          <label style="display:flex;align-items:flex-start;gap:9px;cursor:pointer;font-size:13px;line-height:1.45">
            <input type="checkbox" id="trigger-${t.id}" ${m.triggers?.[t.id]?'checked':''} onchange="onMorningChange()" style="width:auto;margin-top:2px;accent-color:var(--danger)">
            ${t.text}
          </label>`).join('')}
      </div>
      ${anyTrigger?`<div style="margin-top:12px;padding:11px;background:var(--danDim);border:1px solid rgba(239,68,68,.35);border-radius:8px;font-size:12.5px;color:var(--loss)"><strong>Empfehlung:</strong> Heute kein Trading empfohlen.</div>`:''}
    </div>
    <div>
      <label class="label">Implementation Intention</label>
      <p class="sub-label">Wenn-Dann (Gollwitzer 1999 — verdoppelt Erfolgsrate)</p>
      <input id="morning-intention2" value="${m.intention2||''}" placeholder="Wenn ___, dann ___">
    </div>
    <button class="btn btn-full ${log.morningDone?'btn-ghost':'btn-success'}" onclick="completeMorning()">
      ${log.morningDone?'✓ Morning abgeschlossen':'Morning abschließen'}
    </button>
  </div>`;
}

// PRE-TRADING
function renderPreTrading(log) {
  const p = log.preTrading||{};
  return `
  <div class="card gap-col">
    <h3 style="font-size:17px;font-weight:700">👁 Pre-Trading Registration</h3>
    <div class="surface" style="border-color:rgba(45,212,191,.2)">
      <div style="font-size:13.5px;font-weight:600;margin-bottom:6px">Clarity Check</div>
      ${ynField('Bin ich klar über die aktuelle Marktphase?','pre-q1',p.q1)}
      ${ynField('Bin ich ruhig — nicht reaktiv oder emotional?','pre-q2',p.q2)}
      ${ynField('Ist das Setup mein Setup — nicht FOMO oder Boredom?','pre-q3',p.q3)}
      ${(p.q1&&p.q2&&p.q3)?`<div class="banner ${(p.q1==='yes'&&p.q2==='yes'&&p.q3==='yes')?'banner-win':'banner-danger'}" style="margin-top:10px;font-size:12.5px;color:${(p.q1==='yes'&&p.q2==='yes'&&p.q3==='yes')?'var(--win)':'var(--loss)'}">
        ${(p.q1==='yes'&&p.q2==='yes'&&p.q3==='yes')?'<strong>Alle drei Ja.</strong> Du bist trading-fähig.':'<strong>Mindestens eine Nein.</strong> Heute kein Trading.'}
      </div>`:''}
    </div>
    <div>
      <label class="label">Erwartetes Setup heute</label>
      <p class="sub-label">Vor dem ersten Chart aufschreiben (Pre-Mortem, Klein 2007)</p>
      <textarea id="pre-expected" rows="3" placeholder="Heute erwarte ich…">${p.expectedSetup||''}</textarea>
    </div>
    ${ynField('Box Breathing heute Morgen gemacht?','pre-breath',p.breathDone)}
    <button class="btn btn-full ${log.preTradingDone?'btn-ghost':'btn-success'}" onclick="completePreTrading()">
      ${log.preTradingDone?'✓ Pre-Trading abgeschlossen':'Pre-Trading abschließen'}
    </button>
  </div>`;
}

// TRADES PHASE
function renderTradesPhase(log, dd) {
  const trades = log.trades||[];
  const totalR = trades.reduce((s,t)=>s+(parseFloat(t.rMultiple)||0),0);
  const totalPL = trades.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const forced = trades.filter(t=>!t.wasValidSBS).length;
  const locked = dd.blocked || trades.length >= 2;
  return `
  <div class="card gap-col">
    <h3 style="font-size:17px;font-weight:700">📊 Trade Logging</h3>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Trades</div><div class="stat-value tnum" style="color:${trades.length>2?'var(--loss)':'var(--tx)'}">${trades.length}/2</div></div>
      <div class="stat-card"><div class="stat-label">Ergebnis</div><div class="stat-value tnum" style="color:${totalR>=0?'var(--win)':'var(--loss)'}">${fmt(totalR)}R</div></div>
      <div class="stat-card"><div class="stat-label">P&L</div><div class="stat-value tnum" style="color:${totalPL>=0?'var(--win)':'var(--loss)'}">${fmtEur(totalPL)}</div></div>
      <div class="stat-card"><div class="stat-label">Forced</div><div class="stat-value tnum" style="color:${forced===0?'var(--win)':'var(--loss)'}">${forced}</div></div>
    </div>
    ${dd.blocked?`<div class="banner banner-danger" style="display:flex;gap:10px;font-size:12.5px;color:var(--loss)">🔒 <div><strong>Trading gesperrt.</strong><br><span style="color:var(--txD)">Das ist der Reflex, der den Account rettet. Für heute ist Schluss.</span></div></div>`:''}
    ${!dd.blocked&&trades.length>=2?`<div class="banner banner-warn" style="font-size:12.5px;color:var(--warn)"><strong>2 Trades erreicht.</strong> Trading-Tag beendet.</div>`:''}
    ${state.showTradeForm&&!locked ? renderTradeForm() : `<button class="btn btn-primary btn-full" ${locked?'disabled':''} onclick="toggleTradeForm()">${locked?'🔒 Trading gesperrt':'+ Neuen Trade dokumentieren'}</button>`}
    ${trades.map((t,i)=>renderTradeRow(t,i)).join('')}
  </div>`;
}

function renderTradeRow(t, i) {
  const r = parseFloat(t.rMultiple)||0;
  return `
  <div class="trade-row ${!t.wasValidSBS?'forced':''}">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="tnum" style="font-size:11.5px;color:var(--txF)">${t.time||''}</span>
        <span class="tnum" style="font-size:13.5px;font-weight:600">${t.symbol||''}</span>
        <span style="font-size:12.5px;font-weight:600;color:${t.direction==='Buy'?'var(--ac)':'#fb923c'}">${t.direction||''}</span>
        <span style="font-size:11px;padding:2px 7px;border-radius:5px;background:${gradeColor(t.grade)}22;color:${gradeColor(t.grade)};font-weight:600">${t.grade||''}</span>
        <span style="font-size:11.5px;color:var(--txF)">${t.emotion||''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="tnum" style="font-size:14px;font-weight:700;color:${r>=0?'var(--win)':'var(--loss)'}">${fmt(r)}R</span>
        <button class="btn btn-sm btn-ghost" onclick="removeTrade(${t.id})" style="padding:5px 8px;font-size:12px">✕</button>
      </div>
    </div>
    ${!t.wasValidSBS?'<div style="font-size:11.5px;color:var(--loss);margin-top:4px">⚠ Forced Setup</div>':''}
    ${t.tags?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${t.tags.split(',').filter(Boolean).map(tag=>`<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:var(--acDim);color:var(--ac)">${tag}</span>`).join('')}</div>`:''}
    ${t.reflection?`<p style="font-size:12px;color:var(--txD);font-style:italic;margin-top:4px">"${t.reflection}"</p>`:''}
  </div>`;
}

function renderTradeForm() {
  const tf = state.tradeForm||{ symbol:'XAUUSD', direction:'Buy', riskPct:1, slPips:'', outcome:'win', rResult:'', grade:'A', emotion:'Neutral', wasValidSBS:null, reflection:'' };
  const inst = INSTRUMENTS[tf.symbol]||INSTRUMENTS.EURUSD;
  const riskEur = (state.account.size||100000)*(tf.riskPct/100);
  const sl = parseFloat(tf.slPips)||0;
  const sugLots = sl > 0 ? (riskEur/(sl*inst.pipValuePerLot)).toFixed(2) : '—';
  const rMult = tf.outcome==='win'?(parseFloat(tf.rResult)||0):tf.outcome==='be'?0:-1;
  const pnl = rMult*riskEur;
  return `
  <div class="surface" style="border-color:rgba(45,212,191,.25);gap:12px;display:flex;flex-direction:column">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="label" style="font-size:11.5px;color:var(--txF)">Symbol</label>
        <select onchange="tfChange('symbol',this.value)">${Object.keys(INSTRUMENTS).map(k=>`<option ${tf.symbol===k?'selected':''}>${k}</option>`).join('')}</select></div>
      <div><label class="label" style="font-size:11.5px;color:var(--txF)">Richtung</label>
        <select onchange="tfChange('direction',this.value)"><option ${tf.direction==='Buy'?'selected':''}>Buy</option><option ${tf.direction==='Sell'?'selected':''}>Sell</option></select></div>
      <div><label class="label" style="font-size:11.5px;color:var(--txF)">Risiko %</label>
        <input type="number" step="0.25" value="${tf.riskPct}" onchange="tfChange('riskPct',parseFloat(this.value))"></div>
      <div><label class="label" style="font-size:11.5px;color:var(--txF)">Stop-Loss (Pips)</label>
        <input type="number" value="${tf.slPips}" placeholder="z.B. 50" onchange="tfChange('slPips',this.value)"></div>
    </div>
    <div style="background:var(--surf);border:1px solid var(--bd);border-radius:9px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><div style="font-size:11px;color:var(--txF)">Risiko in €</div><div class="tnum" style="font-size:16px;font-weight:600;color:var(--loss)">${Math.round(riskEur)} €</div></div>
      <div><div style="font-size:11px;color:var(--txF)">Vorgeschlagene Lots</div><div class="tnum" style="font-size:16px;font-weight:600;color:var(--ac)">${sugLots}</div></div>
    </div>
    <div>
      <label class="label" style="font-size:11.5px;color:var(--txF)">Ergebnis</label>
      <div style="display:flex;gap:8px">
        ${[['win','Win','var(--win)'],['be','Break-even','var(--txD)'],['loss','Loss (−1R)','var(--loss)']].map(([v,l,c])=>`
          <button onclick="tfChange('outcome','${v}')" style="flex:1;padding:8px;border-radius:8px;font-size:12.5px;font-weight:600;border:1px solid ${tf.outcome===v?c:'var(--bd)'};background:${tf.outcome===v?c+'22':'var(--surf)'};color:${tf.outcome===v?c:'var(--txD)'}">${l}</button>`).join('')}
      </div>
    </div>
    ${tf.outcome==='win'?`<div><label class="label" style="font-size:11.5px;color:var(--txF)">Gewinn in R</label><input type="number" step="0.1" value="${tf.rResult}" placeholder="z.B. 2.0" onchange="tfChange('rResult',this.value)"></div>`:''}
    <div style="background:var(--surf);border:1px solid var(--bd);border-radius:9px;padding:12px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12.5px;color:var(--txD)">Ergebnis</span>
      <span class="tnum" style="font-size:18px;font-weight:700;color:${rMult>=0?'var(--win)':'var(--loss)'}">${fmt(rMult)}R · ${fmtEur(pnl)}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="label" style="font-size:11.5px;color:var(--txF)">Grade</label>
        <select onchange="tfChange('grade',this.value)">${['A+','A','B','C','X'].map(g=>`<option ${tf.grade===g?'selected':''}>${g}</option>`).join('')}</select></div>
      <div><label class="label" style="font-size:11.5px;color:var(--txF)">Emotion</label>
        <select onchange="tfChange('emotion',this.value)">${['Neutral','Selbstsicher','Frustriert','FOMO','Müde','Gelangweilt','Gestresst'].map(o=>`<option ${tf.emotion===o?'selected':''}>${o}</option>`).join('')}</select></div>
    </div>
    <div>
      <label class="label" style="font-size:11.5px;color:var(--txF)">Setup-Tags (mehrere möglich)</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
        ${SETUP_TAGS.map(tag=>{
          const on = (tf.tags||[]).includes(tag);
          return `<button onclick="tfToggleTag('${tag}')" style="padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid ${on?'var(--ac)':'var(--bd)'};background:${on?'var(--acDim)':'var(--surf)'};color:${on?'var(--ac)':'var(--txD)'}">${tag}</button>`;
        }).join('')}
      </div>
    </div>
    <div>
      <label class="label" style="font-size:13px;font-weight:600;color:var(--warn)">Kritische Frage: Vollständiges SBS?</label>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button onclick="tfChange('wasValidSBS',true)" style="flex:1;padding:9px;border-radius:8px;font-weight:600;font-size:12.5px;border:1px solid ${tf.wasValidSBS===true?'var(--win)':'var(--bd)'};background:${tf.wasValidSBS===true?'rgba(52,211,153,.15)':'var(--surf)'};color:${tf.wasValidSBS===true?'var(--win)':'var(--txD)'}">Ja, vollständiges SBS</button>
        <button onclick="tfChange('wasValidSBS',false)" style="flex:1;padding:9px;border-radius:8px;font-weight:600;font-size:12.5px;border:1px solid ${tf.wasValidSBS===false?'var(--loss)':'var(--bd)'};background:${tf.wasValidSBS===false?'rgba(248,113,113,.1)':'var(--surf)'};color:${tf.wasValidSBS===false?'var(--loss)':'var(--txD)'}">Nein, forced</button>
      </div>
    </div>

function renderEquityChart(data) {
  if (data.length < 2) return '';
  const w=640, h=200, padL=40, padB=30, padT=16, padR=16;
  const iW=w-padL-padR, iH=h-padB-padT;
  const minR=Math.min(...data.map(d=>d.r),0);
  const maxR=Math.max(...data.map(d=>d.r),0);
  const range=maxR-minR||1;
  const xS=(i)=>padL+(i-1)/(data.length-1)*iW;
  const yS=(r)=>padT+iH-((r-minR)/range)*iH;
  const pts=data.map(d=>`${xS(d.i).toFixed(1)},${yS(d.r).toFixed(1)}`).join(' ');
  const y0=yS(0);
  return `
  <div class="card">
    <div style="font-size:13px;font-weight:600;color:var(--txD);margin-bottom:12px">Equity-Kurve (R)</div>
    <svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
      <line x1="${padL}" y1="${y0.toFixed(1)}" x2="${w-padR}" y2="${y0.toFixed(1)}" stroke="rgba(148,163,184,.2)" stroke-dasharray="4 4"/>
      <polyline points="${pts}" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linejoin="round"/>
      ${data.map(d=>`<circle cx="${xS(d.i).toFixed(1)}" cy="${yS(d.r).toFixed(1)}" r="3" fill="${d.r>=0?'#34d399':'#f87171'}"/>`).join('')}
    </svg>
  </div>`;
}

// ANALYTICS — Edge-Analyse, Kennzahlen, Heatmap
// ═══════════════════════════════════════════════════════════════
function statsFor(trades) {
  const n = trades.length;
  if (n === 0) return null;
  const rs = trades.map(t=>parseFloat(t.rMultiple)||0);
  const wins = rs.filter(r=>r>0);
  const losses = rs.filter(r=>r<0);
  const grossWin = wins.reduce((s,r)=>s+r,0);
  const grossLoss = Math.abs(losses.reduce((s,r)=>s+r,0));
  const totalR = rs.reduce((s,r)=>s+r,0);
  const winRate = wins.length/n;
  const avgWin = wins.length?grossWin/wins.length:0;
  const avgLoss = losses.length?grossLoss/losses.length:0;
  // Expectancy = (WinRate × AvgWin) − (LossRate × AvgLoss)
  const expectancy = winRate*avgWin - (1-winRate)*avgLoss;
  const profitFactor = grossLoss>0 ? grossWin/grossLoss : (grossWin>0?Infinity:0);
  return { n, totalR, winRate, avgWin, avgLoss, expectancy, profitFactor, wins:wins.length, losses:losses.length };
}

function groupBy(trades, keyFn) {
  const groups = {};
  trades.forEach(t=>{
    const keys = keyFn(t);
    (Array.isArray(keys)?keys:[keys]).forEach(k=>{
      if(k===''||k==null) return;
      (groups[k]=groups[k]||[]).push(t);
    });
  });
  return groups;
}

function hourBlock(t) {
  // Uhrzeit "HH:MM" → Block
  const h = parseInt((t.time||'').split(':')[0]) || 0;
  if (h<9) return 'Vor 09:00';
  if (h<11) return '09–11';
  if (h<13) return '11–13';
  if (h<15) return '13–15';
  return 'Nach 15:00';
}

function weekday(t) {
  const d = new Date(t.date);
  return ['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()];
}

function renderAnalytics() {
  let at = allTrades();
  const activeTag = state.filterTag || null;
  if (activeTag) at = at.filter(t=>(t.tags||'').split(',').includes(activeTag));

  if (allTrades().length === 0) return `
    <div class="gap-col">

      <div class="card" style="text-align:center;padding:40px;color:var(--txD);font-size:13px">Noch keine Trades. Sobald du loggst, baut sich hier deine komplette Edge-Analyse auf.</div>
    </div>`;

  const overall = statsFor(at);

  // Alle Tags die in Trades vorkommen
  const usedTags = [...new Set(allTrades().flatMap(t=>(t.tags||'').split(',').filter(Boolean)))];

  const dimWeekday = groupBy(at, weekday);
  const dimHour    = groupBy(at, hourBlock);

  return `

      <div style="display:flex;flex-wrap:wrap;gap:6px">
        <button onclick="setFilterTag(null)" style="padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid ${!activeTag?'var(--ac)':'var(--bd)'};background:${!activeTag?'var(--acDim)':'var(--surf)'};color:${!activeTag?'var(--ac)':'var(--txD)'}">Alle (${allTrades().length})</button>
        ${usedTags.map(tag=>`<button onclick="setFilterTag('${tag}')" style="padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid ${activeTag===tag?'var(--ac)':'var(--bd)'};background:${activeTag===tag?'var(--acDim)':'var(--surf)'};color:${activeTag===tag?'var(--ac)':'var(--txD)'}">${tag}</button>`).join('')}
      </div>
    </div>`:'<div class="card" style="font-size:12.5px;color:var(--txD);padding:14px">Tipp: Vergib beim Trade-Logging Setup-Tags (z.B. "London Open", "Sweep"). Dann kannst du hier nach ihnen filtern und siehst, welches Setup wirklich dein Edge ist.</div>'}

    <!-- Kennzahlen -->
    <div>
      <div class="section-title">Kennzahlen${activeTag?` · ${activeTag}`:''}</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Trades</div><div class="stat-value tnum">${overall.n}</div></div>
        <div class="stat-card"><div class="stat-label">Win-Rate</div><div class="stat-value tnum" style="color:${overall.winRate>=0.5?'var(--win)':'var(--txD)'}">${Math.round(overall.winRate*100)}%</div></div>
        <div class="stat-card"><div class="stat-label">Gesamt R</div><div class="stat-value tnum" style="color:${overall.totalR>=0?'var(--win)':'var(--loss)'}">${fmt(overall.totalR,1)}R</div></div>
        <div class="stat-card"><div class="stat-label">Expectancy</div><div class="stat-value tnum" style="color:${overall.expectancy>=0?'var(--win)':'var(--loss)'}">${fmt(overall.expectancy,2)}R</div></div>
        <div class="stat-card"><div class="stat-label">Profit Factor</div><div class="stat-value tnum" style="color:${overall.profitFactor>=1?'var(--win)':'var(--loss)'}">${overall.profitFactor===Infinity?'∞':overall.profitFactor.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Ø Win / Ø Loss</div><div class="stat-value tnum" style="font-size:15px">${fmt(overall.avgWin,1)} / ${fmt(-overall.avgLoss,1)}</div></div>
      </div>
      <div class="surface" style="margin-top:10px;font-size:12px;color:var(--txD);line-height:1.6">
        <strong style="color:var(--tx)">Lesehilfe:</strong> Expectancy ist dein Ø-Gewinn pro Trade in R — alles über 0 ist profitabel. Profit Factor über 1 = du verdienst mehr als du verlierst; über 1,5 ist solide, über 2 stark.
      </div>

    <!-- R-Verteilung -->

    ${renderEdgeTable('Nach Symbol', dimSymbol)}
    ${Object.keys(dimTag).length>0?renderEdgeTable('Nach Setup-Tag', dimTag):''}

    <!-- Heatmap -->

      <div class="section-title">P&L-Heatmap</div>
      ${renderHeatmap()}
    </div>
  </div>`;
}

function setFilterTag(tag) { state.filterTag = tag; render(); }

function renderEdgeTable(title, groups, order) {
  let keys = Object.keys(groups);
  if (order) keys = order.filter(k=>groups[k]); else keys.sort((a,b)=>statsFor(groups[b]).totalR-statsFor(groups[a]).totalR);
  if (keys.length===0) return '';
  // bestes / schlechtestes hervorheben
  const totals = keys.map(k=>({k,r:statsFor(groups[k]).totalR}));
  const best = totals.reduce((a,b)=>b.r>a.r?b:a).k;
  const worst = totals.reduce((a,b)=>b.r<a.r?b:a).k;
  return `
  <div>
    <div class="section-title">${title}</div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:grid;grid-template-columns:1.3fr 0.7fr 0.8fr 1fr 1fr;gap:0;font-size:11px;color:var(--txF);padding:10px 14px;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.04em">
        <span></span><span style="text-align:right">Trades</span><span style="text-align:right">Win%</span><span style="text-align:right">Gesamt R</span><span style="text-align:right">Expect.</span>
      </div>
      ${keys.map(k=>{
        const s = statsFor(groups[k]);
        const isBest = k===best && s.totalR>0;
        const isWorst = k===worst && s.totalR<0 && keys.length>1;
        return `<div style="display:grid;grid-template-columns:1.3fr 0.7fr 0.8fr 1fr 1fr;gap:0;font-size:13px;padding:10px 14px;border-bottom:1px solid var(--bd);align-items:center;background:${isBest?'rgba(52,211,153,.06)':isWorst?'rgba(248,113,113,.06)':'transparent'}">
          <span style="font-weight:600;display:flex;align-items:center;gap:6px">${k}${isBest?'<span style="font-size:10px;color:var(--win)">▲ best</span>':''}${isWorst?'<span style="font-size:10px;color:var(--loss)">▼ worst</span>':''}</span>
          <span class="tnum" style="text-align:right;color:var(--txD)">${s.n}</span>
          <span class="tnum" style="text-align:right;color:${s.winRate>=0.5?'var(--win)':'var(--txD)'}">${Math.round(s.winRate*100)}%</span>
          <span class="tnum" style="text-align:right;font-weight:700;color:${s.totalR>=0?'var(--win)':'var(--loss)'}">${fmt(s.totalR,1)}R</span>
          <span class="tnum" style="text-align:right;color:${s.expectancy>=0?'var(--win)':'var(--loss)'}">${fmt(s.expectancy,2)}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderRHistogram(trades) {
  const buckets = { '≤−2':0,'−2…−1':0,'−1…0':0,'0…1':0,'1…2':0,'2…3':0,'≥3':0 };
  trades.forEach(t=>{
    const r = parseFloat(t.rMultiple)||0;
    if(r<=-2) buckets['≤−2']++;
    else if(r<-1) buckets['−2…−1']++;
    else if(r<0) buckets['−1…0']++;
    else if(r<1) buckets['0…1']++;
    else if(r<2) buckets['1…2']++;
    else if(r<3) buckets['2…3']++;
    else buckets['≥3']++;
  });
  const max = Math.max(...Object.values(buckets),1);
  return `
  <div class="card">
    <div style="display:flex;align-items:flex-end;gap:6px;height:120px">
      ${Object.entries(buckets).map(([label,count])=>{
        const isNeg = label.includes('−')&&!label.includes('…0')||label==='≤−2'||label==='−2…−1'||label==='−1…0';
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          <span class="tnum" style="font-size:11px;color:var(--txD);margin-bottom:4px">${count||''}</span>
          <div style="width:100%;height:${(count/max)*88}px;min-height:${count>0?4:0}px;background:${isNeg?'var(--loss)':'var(--win)'};border-radius:4px 4px 0 0;transition:height .3s"></div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:6px;margin-top:6px">
      ${Object.keys(buckets).map(label=>`<span style="flex:1;text-align:center;font-size:9.5px;color:var(--txF)">${label}</span>`).join('')}
    </div>
  </div>`;
}

function renderHeatmap() {
  // P&L pro Tag → Kalender-Grid des aktuellen Monats
  const now = state.calMonth || new Date();
  const yr = now.getFullYear(), mo = now.getMonth();
  const days = new Date(yr,mo+1,0).getDate();
  const firstDay = new Date(yr,mo,1).getDay();
  const off = firstDay===0?6:firstDay-1;
  const mNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  // max abs R für Farbintensität
  let maxAbs = 0.5;
  Object.values(state.dailyLogs).forEach(log=>{
    const r = (log.trades||[]).reduce((s,t)=>s+(parseFloat(t.rMultiple)||0),0);
    maxAbs = Math.max(maxAbs, Math.abs(r));
  });
  return `
  <div class="card">

        const r=(log?.trades||[]).reduce((s,t)=>s+(parseFloat(t.rMultiple)||0),0);
        const has=(log?.trades||[]).length>0;
        let bg='var(--surf2)';

        return `<div title="${date}: ${fmt(r,1)}R" style="aspect-ratio:1;border-radius:6px;background:${bg};border:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px">

          ${has?`<span class="tnum" style="font-size:9px;color:#fff;font-weight:700">${fmt(r,1)}</span>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderPlaybook() {
  const at = allTrades();

  const entries = state.playbook || [];

  const bestSymbol = {};
  valid.forEach(t=>{ bestSymbol[t.symbol]=(bestSymbol[t.symbol]||0)+(parseFloat(t.rMultiple)||0); });
  const symbolRank = Object.entries(bestSymbol).sort((a,b)=>b[1]-a[1]);

  return `

    <h2 style="font-size:22px;font-weight:700;letter-spacing:-.02em">Trading Playbook</h2>
    <div class="banner banner-accent">

      <p style="font-size:13px;color:var(--txD);line-height:1.6">Aus deinen dokumentierten Trades entsteht dein Edge in Schriftform. Oben automatisch: was statistisch für dich funktioniert. Unten dein manuelles Playbook — die Setups, die du wieder und wieder traden willst.</p>

    <div>
      <div class="section-title">Was bei dir funktioniert (auto)</div>

        <div class="stat-card"><div class="stat-label">Valide SBS-Trades</div><div class="stat-value tnum">${valid.length}</div></div>
        <div class="stat-card"><div class="stat-label">A/A+ Gewinner</div><div class="stat-value tnum" style="color:var(--win)">${aPlus.length}</div></div>
        <div class="stat-card"><div class="stat-label">Bestes Symbol</div><div class="stat-value tnum" style="font-size:16px;color:var(--ac)">${symbolRank[0]?symbolRank[0][0]:'—'}</div></div>
      </div>
      ${symbolRank.length>0?`
      <div class="card" style="margin-top:12px">
        <h3 style="font-size:13.5px;font-weight:600;margin-bottom:10px">R pro Symbol (nur valide SBS)</h3>
        ${symbolRank.map(([sym,r])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)">
            <span class="tnum" style="font-size:13.5px;font-weight:600">${sym}</span>
            <span class="tnum" style="font-size:13.5px;font-weight:700;color:${r>=0?'var(--win)':'var(--loss)'}">${fmt(r,1)}R</span>
          </div>`).join('')}

    </div>

    <div>
      <div class="section-title">Mein Playbook</div>
      <div class="card gap-col">
        <h3 style="font-size:14px;font-weight:600">Neues Setup eintragen</h3>
        <div><label class="label" style="font-size:11.5px;color:var(--ac)">Setup-Name</label><input id="pb-name" placeholder="z.B. London Open Long Sweep"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label class="label" style="font-size:11.5px;color:var(--ac)">Symbol</label>
            <select id="pb-symbol">${Object.keys(INSTRUMENTS).map(k=>`<option>${k}</option>`).join('')}</select></div>
          <div><label class="label" style="font-size:11.5px;color:var(--ac)">Richtung</label>
            <select id="pb-dir"><option>Buy</option><option>Sell</option></select></div>

        <div><label class="label" style="font-size:11.5px;color:var(--ac)">Kontext / Bedingung</label><textarea id="pb-context" rows="2" placeholder="Wann tritt dieses Setup auf? Welche Marktphase?"></textarea></div>
        <div><label class="label" style="font-size:11.5px;color:var(--ac)">SBS-Trigger (die 5 Punkte)</label><textarea id="pb-trigger" rows="3" placeholder="Wie sieht die Push→Pullback→Deeper Push→Sweep→Entry Sequenz konkret aus?"></textarea></div>

          ${e.invalid?`<div><div style="font-size:10.5px;color:var(--loss);text-transform:uppercase;letter-spacing:.06em">Invalidierung</div><div style="font-size:13px;color:var(--txD);line-height:1.5">${e.invalid}</div></div>`:''}
        </div>`).join('')}
    </div>`:''}
  </div>`;
}

function savePlaybook() {
  const get = id => (document.getElementById(id)?.value||'');
  const name = get('pb-name');
  if(!name) { alert('Bitte mindestens einen Setup-Namen eingeben.'); return; }
  state.playbook = state.playbook||[];
  state.playbook.push({ id:Date.now(), name,
    symbol:get('pb-symbol'), dir:get('pb-dir'), context:get('pb-context'),
    trigger:get('pb-trigger'), entry:get('pb-entry'), invalid:get('pb-invalid') });
  apiPost('saveSettings', { ...state.account, playbook: state.playbook });
  render();
}

function deletePlaybook(id) {
  if(!confirm('Setup löschen?')) return;
  state.playbook = (state.playbook||[]).filter(e=>e.id!==id);
  render();
}

    {t:'Implementation Intentions (Gollwitzer, 1999)',d:'Meta-Analyse 94 Studien: konkrete Wenn-Dann-Pläne verdoppeln die Erfolgsrate gegenüber allgemeinen Vorsätzen. → Morning & Evening Intentionen'},
    {t:'Dopamin & Anticipation (Schultz, 1998/2016)',d:'Dopamin in der Erwartung, nicht bei der Belohnung. Peak klingt nach 15–20 Min ab. → 20-Minuten-Regel'},
    {t:'Action Bias (Bar-Eli et al., 2007)',d:'Torhüter springen bei 94% der Elfmeter, obwohl Stehenbleiben statistisch besser wäre. Nichts-Tun fühlt sich falsch an. → Geduld als aktive Strategie'},
    {t:'Schlaf & Kognition (Walker, 2017)',d:'≤6 Stunden Schlaf senken kognitive Performance um ~30%. → Schlaf-Trigger im Morning Screening'},

  return `

    <h2 style="font-size:22px;font-weight:700;letter-spacing:-.02em">Dein Weg</h2>

    <div>
      <div class="section-title">Die Prop-Reise</div>
      <div class="gap-col">
        ${Object.values(STAGE_DEFAULTS).map((s,i)=>`
          <div class="card" style="border-color:${i===curIdx?s.key==='funded'?'rgba(52,211,153,.5)':'rgba(45,212,191,.5)':i<curIdx?'rgba(52,211,153,.25)':'var(--bd)'}">

              </div>
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:8px">
                  <h3 style="font-size:14.5px;font-weight:600;color:${i===curIdx?(s.key==='funded'?'var(--win)':'var(--ac)'):'var(--tx)'}">${s.label}</h3>

                </div>
                <p style="font-size:12.5px;color:var(--txD);line-height:1.55;margin-top:4px">${s.note}</p>

        ${[
          {label:'14 Tage dokumentiert', done:days>=14, detail:'Das Fundament. Ohne Daten kein Muster.'},
          {label:'Forced-Quote unter 10%', done:at.length>=10&&fRate<10, detail:'Target: konstant unter 10% Forced Setups.'},
          {label:'Positive R über 30 Trades', done:at.length>=30&&totalR>0, detail:'Statistischer Beweis des Edges.'},

// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════
function attachEvents() {}

function toggleTask(id) {
  state.tasks = state.tasks||{};
  state.tasks[id] = !state.tasks[id];
  render();
}

function onScaleChange(id, val) {
  const parts = id.split('-');
  if(parts[0]==='morning') {
    const log = todayLog();
    const morning = log.morning||{};
    morning[parts[1]] = val;
    saveLog(today(), { ...log, morning });
  } else if(parts[0]==='eve') {
    const log = todayLog();
    const evening = log.evening||{};
    evening[parts[1]] = val;
    saveLog(today(), { ...log, evening });
  }
}

function onYNChange(id, val) {
  const log = todayLog();
  if(id.startsWith('pre-')) {
    const pre = log.preTrading||{};
    pre[id.replace('pre-','')] = val;
    saveLog(today(), { ...log, preTrading: pre });
  }
}

function onMorningChange() {
  const log = todayLog();
  const morning = log.morning||{};
  const triggers = {};
  ['streit','schlaf','business','loss','zwang'].forEach(id => {
    const el = document.getElementById(`trigger-${id}`);
    if(el) triggers[id] = el.checked;
  });
  morning.triggers = triggers;
  const int1 = document.getElementById('morning-intention');
  const int2 = document.getElementById('morning-intention2');
  if(int1) morning.intention = int1.value;
  if(int2) morning.intention2 = int2.value;
  saveLog(today(), { ...log, morning });
}

function completeMorning() {
  const log = todayLog();
  const morning = log.morning||{};
  const int1 = document.getElementById('morning-intention');
  const int2 = document.getElementById('morning-intention2');
  if(int1) morning.intention = int1.value;
  if(int2) morning.intention2 = int2.value;
  const triggers = {};
  ['streit','schlaf','business','loss','zwang'].forEach(id => {
    const el = document.getElementById(`trigger-${id}`);
    if(el) triggers[id] = el.checked;
  });
  morning.triggers = triggers;
  if(!morning.sleep||!morning.stress||!morning.energy||!morning.intention) {
    alert('Bitte Schlaf, Stress, Energie und Intention ausfüllen.');
    return;
  }
  saveLog(today(), { ...log, morning, morningDone: true }, true);
}

function completePreTrading() {
  const log = todayLog();
  const pre = log.preTrading||{};
  const exp = document.getElementById('pre-expected');
  if(exp) pre.expectedSetup = exp.value;
  if(!pre.q1||!pre.q2||!pre.q3||!pre.expectedSetup) {
    alert('Bitte alle Clarity-Check-Fragen und das erwartete Setup ausfüllen.');
    return;
  }
  saveLog(today(), { ...log, preTrading: pre, preTradingDone: true }, true);
}

function selectGrade(g) {
  const log = todayLog();
  const post = log.postTrading||{};
  post.dayGrade = g;
  saveLog(today(), { ...log, postTrading: post });
}

function completePostTrading() {
  const log = todayLog();
  const post = log.postTrading||{};
  const good = document.getElementById('post-good');
  const bad  = document.getElementById('post-bad');
  const pat  = document.getElementById('post-pattern');
  if(good) post.went_well   = good.value;
  if(bad)  post.didnt_work  = bad.value;
  if(pat)  post.pattern     = pat.value;
  if(!post.went_well||!post.didnt_work||!post.pattern||!post.dayGrade) {
    alert('Bitte alle Felder und den Grade ausfüllen.');
    return;
  }
  saveLog(today(), { ...log, postTrading: post, postTradingDone: true }, true);
}

function completeEvening() {
  const log = todayLog();
  const evening = log.evening||{};
  const w = document.getElementById('eve-write');
  const g = document.getElementById('eve-grat');
  const p = document.getElementById('eve-plan');
  if(w) evening.expressive = w.value;
  if(g) evening.gratitude  = g.value;
  if(p) evening.tomorrow   = p.value;
  if(!evening.expressive||!evening.gratitude||!evening.tomorrow) {
    alert('Bitte Writing, Dankbarkeit und Intention ausfüllen.');
    return;
  }
  saveLog(today(), { ...log, evening, eveningDone: true }, true);
}

// Trade Form
function toggleTradeForm() {
  state.showTradeForm = !state.showTradeForm;
  if(state.showTradeForm) state.tradeForm = { symbol:'XAUUSD', direction:'Buy', riskPct:1, slPips:'', outcome:'win', rResult:'', grade:'A', emotion:'Neutral', wasValidSBS:null, reflection:'' };
  render();
}

function tfChange(key, val) {
  state.tradeForm = { ...(state.tradeForm||{}), [key]: val };
  render();
}

function tfToggleTag(tag) {
  const tf = state.tradeForm || {};
  const tags = tf.tags || [];
  tf.tags = tags.includes(tag) ? tags.filter(t=>t!==tag) : [...tags, tag];
  state.tradeForm = tf;
  render();
}

function submitTrade() {
  const tf = state.tradeForm||{};
  if(tf.wasValidSBS===null) return;
  const inst = INSTRUMENTS[tf.symbol]||INSTRUMENTS.EURUSD;
  const riskEur = (state.account.size||100000)*(tf.riskPct/100);
  const sl = parseFloat(tf.slPips)||0;
  const sugLots = sl>0 ? (riskEur/(sl*inst.pipValuePerLot)) : 0;
  const rMult = tf.outcome==='win'?(parseFloat(tf.rResult)||0):tf.outcome==='be'?0:-1;
  const pnl = rMult*riskEur;
  const trade = {
    ...tf, id: Date.now(),
    time: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
    rMultiple: rMult, pnl, riskEur, suggestedLots: sugLots,
    tags: (tf.tags||[]).join(',')
  };
  const log = todayLog();
  const trades = [...(log.trades||[]), trade];
  saveLog(today(), { ...log, trades }, true);
  saveTrade(trade);
  state.showTradeForm = false;
  state.tradeForm = null;
  render();
}

function removeTrade(id) {
  if(!confirm('Trade löschen?')) return;
  const log = todayLog();
  const trades = (log.trades||[]).filter(t=>t.id!==id);
  saveLog(today(), { ...log, trades });
  deleteTradeRemote(id);
}

// Calendar
function calPrev() { state.calMonth = new Date((state.calMonth||new Date()).getFullYear(),(state.calMonth||new Date()).getMonth()-1); render(); }
function calNext() { state.calMonth = new Date((state.calMonth||new Date()).getFullYear(),(state.calMonth||new Date()).getMonth()+1); render(); }
function selectCalDay(d) { state.selectedCalDay = state.selectedCalDay===d?null:d; render(); }

// Breathing
let breathTimer=null;
function startBreath() {
  if(breathTimer) { clearInterval(breathTimer); breathTimer=null; document.getElementById('breath-btn').textContent='Starten'; document.getElementById('breath-label').textContent='Start'; document.getElementById('breath-circle').style.transform='scale(1)'; document.getElementById('breath-circle').style.borderColor='var(--bd)'; return; }
  const phases=[{label:'Einatmen',dur:4000,scale:1.15,color:'var(--ac)'},{label:'Halten',dur:4000,scale:1.15,color:'var(--warn)'},{label:'Ausatmen',dur:4000,scale:0.85,color:'#a78bfa'},{label:'Halten',dur:4000,scale:0.85,color:'var(--warn)'}];
  let i=0;
  const tick=()=>{
    const p=phases[i%phases.length];
    document.getElementById('breath-label').textContent=p.label;
    document.getElementById('breath-circle').style.transform=`scale(${p.scale})`;
    document.getElementById('breath-circle').style.borderColor=p.color;
    i++;
  };
  tick();
  breathTimer=setInterval(tick,4000);
  document.getElementById('breath-btn').textContent='Stoppen';
}

// FAB
let fabOpen=false;
function fabToggle() {
  fabOpen=!fabOpen;
  document.getElementById('fab').textContent=fabOpen?'×':'+';
  if(fabOpen) { state.showTradeForm=true; render(); }
}

async function init() {
  await loadAll();
  document.getElementById('loading-overlay').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('fab').style.display='flex';
  render();
}

init();
</script>
